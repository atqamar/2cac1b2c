<div id="root">
  <div class="gate">
    <div class="login-mark" aria-hidden="true">&#x03C3;</div>
    <form id="gate-form" autocomplete="off">
      <label for="pw">Enter access password</label>
      <input id="pw" type="password" autofocus required>
      <button id="gate-btn" type="submit">Unlock</button>
      <div class="err" id="gate-err"></div>
    </form>
  </div>
</div>
